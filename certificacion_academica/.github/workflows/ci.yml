name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: certificacion_academica/yarn.lock

      - name: Install dependencies
        run: |
          cd certificacion_academica
          yarn install --frozen-lockfile

      - name: Run web build
        run: |
          cd certificacion_academica
          yarn build

      - name: Run JS tests
        run: |
          cd certificacion_academica
          yarn run test:etapa2
          yarn run test:etapa5

      - name: Run Anchor tests
        run: |
          cd certificacion_academica
          anchor test
